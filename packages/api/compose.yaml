# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Build context is the repo root since this is a uv workspace monorepo.
# Run with: docker compose -f packages/api/compose.yaml up --build

services:
  api:
    build:
      context: ../..
      dockerfile: packages/api/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../../.env
    environment:
      - POSTGRES_HOST=terrascope-postgres
      - TEMPORAL_HOST=terrascope-temporal
    volumes:
      - api-uploads:/app/uploads
      - api-output:/app/output
    networks:
      - terrascope-network
    depends_on:
      - postgres

  postgres:
    extends:
      file: ../../infra/compose/compose.postgres.yml
      service: postgres
    networks:
      - terrascope-network

volumes:
  api-uploads:
  api-output:

networks:
  terrascope-network:
    external: true
