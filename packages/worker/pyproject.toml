[project]
name = "terrascope-worker"
version = "0.1.0"
description = "Terrascope Temporal worker"
requires-python = ">=3.14"
dependencies = [
    "terrascope-core",
    "temporalio>=1.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/worker"]

[tool.uv.sources]
terrascope-core = { workspace = true }
