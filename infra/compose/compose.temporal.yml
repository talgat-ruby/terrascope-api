---
services:
  elasticsearch:
    image: elasticsearch:8.19.0
    container_name: terrascope-elasticsearch
    environment:
      cluster.routing.allocation.disk.threshold_enabled: true
      cluster.routing.allocation.disk.watermark.low: 512mb
      cluster.routing.allocation.disk.watermark.high: 256mb
      cluster.routing.allocation.disk.watermark.flood_stage: 128mb
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms256m -Xmx256m
      xpack.security.enabled: false
    ports:
      - $ELASTICSEARCH_PORT:9200
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 30s
    networks:
      terrascope-network:
        aliases:
          - $ELASTICSEARCH_CONTAINER_NAME

  temporal-admin-tools:
    image: temporalio/admin-tools:latest
    container_name: terrascope-temporal-admin-tools
    restart: on-failure:6
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PWD: $POSTGRES_PASSWORD
      SQL_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_SEEDS: $POSTGRES_CONTAINER_NAME
      ES_HOST: $ELASTICSEARCH_CONTAINER_NAME
      ES_PORT: 9200
      ES_SCHEME: http
      ES_VERSION: v8
      ES_VISIBILITY_INDEX: temporal_visibility_v1_dev
    volumes:
      - ../temporal/scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres-es.sh
    networks:
      terrascope-network:
        aliases:
          - $TEMPORAL_ADMIN_TOOLS_CONTAINER_NAME

  temporal:
    container_name: terrascope-temporal
    image: temporalio/server:latest
    depends_on:
      temporal-admin-tools:
        condition: service_completed_successfully
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PWD: $POSTGRES_PASSWORD
      POSTGRES_SEEDS: $POSTGRES_CONTAINER_NAME
      ENABLE_ES: true
      ES_SEEDS: $ELASTICSEARCH_CONTAINER_NAME
      ES_VERSION: v8
      BIND_ON_IP: 0.0.0.0
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - $TEMPORAL_PORT:7233
    volumes:
      - ../temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60
    networks:
      terrascope-network:
        aliases:
          - $TEMPORAL_CONTAINER_NAME

  temporal-create-namespace:
    image: temporalio/admin-tools:latest
    container_name: terrascope-temporal-create-namespace
    restart: on-failure:6
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: default
    volumes:
      - ../temporal/scripts:/scripts
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh
    networks:
      terrascope-network:
        aliases:
          - $TEMPORAL_CREATE_NAMESPACE_CONTAINER_NAME

  temporal-ui:
    container_name: terrascope-temporal-ui
    image: temporalio/ui:latest
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - $TEMPORAL_UI_PORT:8080
    networks:
      terrascope-network:
        aliases:
          - $TEMPORAL_UI_CONTAINER_NAME
